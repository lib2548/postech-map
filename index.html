        { id: "_3F-373", start: "900", end: "999" }
    ];

    // 🚀 3. 청구기호 정규화 함수
    function normalizeCN(cn) {
        if (!cn) return "";
        let out = cn.toUpperCase().replace(/\s+/g, '');
        out = out.replace(/([A-Z]+)(\d+)/g, (m, p1, p2) => p1 + p2.padStart(5, '0'));
        out = out.replace(/\.(\d+)/g, (m, p1) => p1.padEnd(5, '0'));
        return out;
    }

    // 🚀 4. 층 결정 로직
    function determineFloor(cn) {
        const firstChar = cn.charAt(0).toUpperCase();
        return (firstChar >= 'A' && firstChar <= 'L') ? 3 : 4;
    }

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        let rawLOC = params.get('loc') ? decodeURIComponent(params.get('loc')).trim() : "";
        const rawCN = params.get('cn') || "";
        const status = document.getElementById('status-bar');

        let targetFloor = 3;
        let targetIds = [];

        // [우선순위 1] 특수 위치 체크
        if (rawLOC && specialLocations[rawLOC]) {
            targetFloor = specialLocations[rawLOC].floor;
            targetIds = specialLocations[rawLOC].ids;
            status.innerHTML = `✅ 위치 안내: <span style="color:#005a92;">${rawLOC}</span>`;
        } 
        // [우선순위 2] 일반 청구기호 검색
        else if (rawCN) {
            targetFloor = determineFloor(rawCN);
            
            if (targetFloor === 3) {
                const targetNormalized = normalizeCN(rawCN);
                const foundShelf = shelfMapping.find(d => {
                    const startNorm = normalizeCN(d.start);
                    const endNorm = normalizeCN(d.end);
                    return targetNormalized >= startNorm && targetNormalized <= endNorm;
                });

                if (foundShelf) {
                    targetIds.push(foundShelf.id);
                    status.innerHTML = `✅ 청구기호 [${rawCN}] 위치: <span style="color:#005a92;">${foundShelf.id.replace('_', '')} 서가</span>`;
                } else {
                    status.innerText = `❌ 청구기호 [${rawCN}] 범위 밖입니다.`;
                }
            } else {
                status.innerHTML = `✅ 청구기호 [${rawCN}] 위치: 4층 (세부서가 업데이트 예정)`;
            }
        } else {
            status.innerText = `🔍 일반 도서 혹은 위치 정보 없음`;
        }

        // 화면 레이어 처리
        document.querySelectorAll('.map-layer').forEach(div => div.classList.remove('active'));
        const activeLayer = document.getElementById(`svg-${targetFloor}f`);
        
        if (activeLayer) {
            activeLayer.classList.add('active');
            document.getElementById('floor-title').innerText = `📍 ${targetFloor}층 위치 안내`;
            
            setTimeout(() => {
                targetIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('highlight');
                });
            }, 100);
        }
    };
</script>
